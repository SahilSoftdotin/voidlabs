<!DOCTYPE html>
<html>
  <head>
    <script>
      // GitHub Pages 404 redirect workaround
      // This script redirects to index.html with the original path as a query parameter
      var segment = "";
      var pathArray = window.location.pathname.split('/');
      
      if (pathArray[1] === 'voidlabs') {
        segment = pathArray.slice(2).join('/');
      }

      if (segment !== "") {
        window.location.replace('/voidlabs/?' + segment);
      }
    </script>
  </head>
  <body>
  </body>
</html>
